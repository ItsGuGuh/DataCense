<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página não encontrada</title>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0a16;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 40px;
        }
        h1 {
            font-size: 6rem;
            margin: 0;
            color: #3b82f6;
            text-shadow: 0 0 20px rgba(59,130,246,0.5);
        }
        h2 {
            font-size: 2rem;
            margin: 10px 0 20px;
        }
        p {
            color: #9ca3af;
            margin-bottom: 30px;
        }
        a {
            display: inline-block;
            padding: 12px 30px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
        }
        a:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(59,130,246,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Página não encontrada</h2>
        <p>A página que você está procurando não existe ou foi movida.</p>
        <a href="/">Voltar para o início</a>
    </div>
</body>
</html>
