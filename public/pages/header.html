<header class="top-header">
    <div class="welcome-text">
        <h1>Olá, <span x-text="userData.formattedName"></span>!</h1>
        <p>Bem-vindo ao centro de comando.</p>
    </div>

    <div class="header-actions">
        <button class="action-icon-btn" @click="modais.patchNotes = true" title="Notas de Atualização">
            <i class="fas fa-scroll"></i>
        </button>

        <div class="dropdown-wrapper" @click.away="mostrarNotificacoes = false">
            <button class="action-icon-btn" @click="mostrarNotificacoes = !mostrarNotificacoes">
                <i class="fas fa-bell"></i>
                <span class="badge" x-show="notificacoesNaoLidas > 0" x-text="notificacoesNaoLidas"></span>
            </button>

            <div class="notification-dropdown" x-show="mostrarNotificacoes" x-transition.opacity x-cloak>
                <div class="notif-header">
                    <h3>Central de Notificações</h3>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <span class="notif-total-badge" x-text="notificacoesNaoLidas"></span>
                        <button class="notif-close-btn" @click="mostrarNotificacoes = false"><i
                                class="fas fa-times"></i></button>
                    </div>
                </div>

                <div class="notif-tabs">
                    <button :class="{'active': notifTab === 'unread'}" @click="mudarAbaNotificacao('unread')">
                        Não Lidas <span class="tab-badge unread" x-text="notificacoesNaoLidas"></span>
                    </button>
                    <button :class="{'active': notifTab === 'all'}" @click="mudarAbaNotificacao('all')">
                        Todas <span class="tab-badge all" x-text="notificacoesTotal"></span>
                    </button>
                </div>

                <div class="notif-body">
                    <div x-show="isCarregandoAba" class="notif-empty" style="padding: 30px;">
                        <i class="fas fa-circle-notch fa-spin"
                            style="font-size: 2.5rem; color: var(--accent); margin-bottom: 10px;"></i>
                        <p>Carregando notificações...</p>
                    </div>

                    <div x-show="!isCarregandoAba">
                        <template x-for="notif in notificacoes" :key="notif.id">
                            <div class="notif-item" :class="{'unread': !notif.visualizado}"
                                @click="marcarNotificacaoLida(notif)">
                                <div class="notif-icon"><i
                                        :class="(notif.icon && notif.icon.includes('fa-')) ? notif.icon : 'fas fa-info-circle'"></i>
                                </div>
                                <div class="notif-content">
                                    <h4><span x-text="notif.tipo"></span> <span class="notif-sender"
                                            x-show="notif.remetente"
                                            x-text="' - ' + formatName(notif.remetente)"></span></h4>
                                    <p x-text="notif.mensagem"></p>
                                    <span class="notif-time" x-text="formatDate(notif.data_hora_criado)"></span>
                                </div>
                                <button class="notif-delete-btn" @click="deletarNotificacao(notif.id, $event)"
                                    title="Apagar Notificação"><i class="fas fa-trash"></i></button>
                            </div>
                        </template>
                        <div x-show="notificacoes.length === 0" class="notif-empty">
                            <i class="fas fa-bell-slash"></i>
                            <h4>Nenhuma notificação</h4>
                            <p>Você não possui notificações nesta aba.</p>
                        </div>
                    </div>
                </div>

                <div class="notif-footer" style="flex-direction: column; gap: 10px;">
                    <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                        <button class="notif-mark-read-btn" @click="marcarTodasComoLidas()">
                            <i class="fas fa-check-double"></i> Marcar como Lidas
                        </button>

                        <template x-if="!notifModoVerTodas">
                            <button class="notif-history-btn" @click="ativarVerTodas()"
                                style="color: var(--accent);">Ver Todas</button>
                        </template>
                        <template x-if="notifModoVerTodas">
                            <button class="notif-history-btn" @click="limparHistoricoNotificacoes()"><i
                                    class="fas fa-broom"></i> Limpar Histórico</button>
                        </template>
                    </div>

                    <template x-if="notifModoVerTodas">
                        <div class="notif-pagination">
                            <button @click="mudarPaginaNotificacao('ant')" :disabled="notifPaginaAtual === 1"><i
                                    class="fas fa-chevron-left"></i></button>
                            <span>Pág. <span x-text="notifPaginaAtual"></span></span>
                            <button @click="mudarPaginaNotificacao('prox')" :disabled="notificacoes.length < 25"><i
                                    class="fas fa-chevron-right"></i></button>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <div class="dropdown-wrapper">
            <button class="action-icon-btn" @click="modais.themeOpen = !modais.themeOpen"
                @click.away="modais.themeOpen = false">
                <i class="fas fa-palette"></i>
            </button>

            <div class="theme-dropdown" x-show="modais.themeOpen" x-transition.opacity x-cloak>
                <div class="theme-option" @click="setTheme('datacense'); modais.themeOpen = false"
                    :class="{'active': currentTheme === 'datacense'}">
                    <div class="color-preview" style="background: #0a0a16; border: 2px solid #3b82f6;"></div>
                    <span>DataCense (Padrão)</span>
                </div>
                <div class="theme-option" @click="setTheme('trc-light'); modais.themeOpen = false"
                    :class="{'active': currentTheme === 'trc-light'}">
                    <div class="color-preview" style="background: #A60311; border: 2px solid #ffffff;"></div>
                    <span>TRC Taborda (Claro)</span>
                </div>
                <div class="theme-option" @click="setTheme('trc-dark'); modais.themeOpen = false"
                    :class="{'active': currentTheme === 'trc-dark'}">
                    <div class="color-preview" style="background: #A60311; border: 2px solid #3b82f6;"></div>
                    <span>TRC Taborda (Escuro)</span>
                </div>
                <div class="theme-option" @click="setTheme('sky'); modais.themeOpen = false"
                    :class="{'active': currentTheme === 'sky'}">
                    <div class="color-preview" style="background: #ffffff; border: 2px solid #3b82f6;"></div>
                    <span>Sky (Claro)</span>
                </div>
                <div class="theme-option" @click="setTheme('oled'); modais.themeOpen = false"
                    :class="{'active': currentTheme === 'oled'}">
                    <div class="color-preview" style="background: #000000; border: 2px solid #ffffff;"></div>
                    <span>OLED (Escuro)</span>
                </div>
                <div class="theme-option" @click="setTheme('neon'); modais.themeOpen = false"
                    :class="{'active': currentTheme === 'neon'}">
                    <div class="color-preview" style="background: #050014; border: 2px solid #ff007f;"></div>
                    <span>Cyberpunk Neon</span>
                </div>
                <div class="theme-option" @click="setTheme('matrix'); modais.themeOpen = false"
                    :class="{'active': currentTheme === 'matrix'}">
                    <div class="color-preview" style="background: #001100; border: 2px solid #00ff00;"></div>
                    <span>Terminal Matrix</span>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container">
        <template x-for="toast in toastsAtivos" :key="toast.toastId">
            <div class="toast-preview" @click="marcarNotificacaoLida(toast); removerToast(toast.toastId)">
                <div class="toast-icon">
                    <i :class="(toast.icon && toast.icon.includes('fa-')) ? toast.icon : 'fas fa-info-circle'"></i>
                </div>
                <div class="toast-content">
                    <h4 x-text="toast.tipo"></h4>
                    <p x-text="toast.mensagem"></p>
                </div>
                <button class="toast-close" @click.stop="removerToast(toast.toastId)"><i
                        class="fas fa-times"></i></button>
            </div>
        </template>
    </div>
</header>

<div class="popup-overlay" x-show="modais.patchNotes" x-transition.opacity x-cloak
    style="position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center;">

    <div class="updates-modal" @click.away="modais.patchNotes = false" style="margin: auto;">
        <div class="updates-header">
            <h2><i class="fas fa-rocket"></i> Notas de Atualização</h2>
            <button class="updates-close-btn" @click="modais.patchNotes = false"
                style="background: none; border: none; color: var(--text-secondary); font-size: 1.2rem; cursor: pointer;"><i
                    class="fas fa-times"></i></button>
        </div>

        <div class="updates-layout">
            <div class="updates-sidebar">
                <template x-for="group in updatesAgrupados" :key="group.major">
                    <div class="version-group">
                        <div class="version-group-header" @click="group.isOpen = !group.isOpen"
                            style="cursor: pointer; justify-content: space-between; display: flex; padding: 10px; color: var(--text-primary); font-weight: bold; border-bottom: 1px solid var(--border-color);">
                            <div><i class="fas fa-layer-group" style="color: var(--accent);"></i> <span
                                    x-text="group.major"></span></div>
                            <i class="fas" :class="group.isOpen ? 'fa-chevron-up' : 'fa-chevron-down'"
                                style="font-size: 0.8rem; color: var(--text-secondary);"></i>
                        </div>
                        <div class="version-list" x-show="group.isOpen" x-collapse>
                            <template x-for="update in group.items" :key="update.id">
                                <div class="version-item"
                                    style="padding: 10px 20px; cursor: pointer; color: var(--text-secondary); transition: 0.2s;"
                                    :class="{'active': updateSelecionado && updateSelecionado.id === update.id}"
                                    @click="selecionarUpdate(update)">
                                    <i class="fas fa-code-branch"></i> <span x-text="update.version"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>

            <div class="updates-content">
                <template x-if="updateSelecionado">
                    <div>
                        <div class="update-card-header"
                            style="display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px;">
                            <span class="card-version-badge"
                                style="background: var(--accent); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold;"
                                x-text="updateSelecionado.version"></span>
                            <span class="card-date" style="color: var(--text-secondary);"
                                x-text="formatDate(updateSelecionado.release_date).split(' às ')[0]"></span>
                        </div>
                        <h3 class="update-card-title" style="font-size: 1.5rem; margin-bottom: 15px;"
                            x-text="updateSelecionado.title"></h3>
                        <p class="update-card-desc" style="line-height: 1.6; color: var(--text-secondary);"
                            x-text="updateSelecionado.description"></p>
                    </div>
                </template>
                <template x-if="!updateSelecionado">
                    <div class="updates-placeholder"
                        style="text-align: center; color: var(--text-secondary); padding: 50px;">
                        <i class="fas fa-box-open" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i>
                        <p>Nenhuma nota encontrada.</p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</div>
